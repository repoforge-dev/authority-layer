name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Build core
        run: npm run -w authority-layer build

      - name: Typecheck core
        run: npm run -w authority-layer typecheck

      - name: Run minimal validation example
        run: npm run -w authority-layer validate
